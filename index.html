/* ============================================================
   VERSION 1 - in progress
   Starting point: identical to V0. This is where the rewrite
   happens: window.storage → localStorage, AI translation →
   client-side WASM model (+ Chrome native Translator API as a
   bonus fast-path), example sentences → static-only or a small
   serverless proxy, depending on what's chosen.
   Goal: fully hostable on a free static platform (GitHub Pages,
   Cloudflare Pages, Netlify, Vercel) with no ongoing AI cost to
   anyone.
   ============================================================ */

const { useState, useCallback, useEffect, useMemo, useRef, createContext, useContext } = React;

/* ---- storage adapter (V1 rewrite step 1): localStorage instead of
   window.storage. Same async shape ({key, value} from .get, void from
   .set) so every call site that already does `await storage.get(...)`
   keeps working unchanged - only the underlying mechanism moved from
   the Claude-artifact-specific API to a standard browser one. No more
   "shared vs personal" flag either: localStorage is always scoped to
   one browser on one device, so two people studying from two different
   phones simply can never see each other's data - there's no setting
   that could get that wrong. The tradeoff, stated plainly: progress
   does not follow a person across devices, only across sessions on the
   same one. ---- */
const storage = {
  get: async (key) => {
    try {
      const v = localStorage.getItem(key);
      return v === null ? null : { key, value: v };
    } catch (e) {
      return null; // private-browsing / storage disabled - degrade to in-memory only, same as before
    }
  },
  set: async (key, value) => {
    try {
      localStorage.setItem(key, value);
      return { key, value };
    } catch (e) {
      return null;
    }
  },
  remove: async (key) => {
    try { localStorage.removeItem(key); } catch (e) {}
  },
};

/* ---- progress (persisted across sessions via localStorage) ---- */
/* Spaced repetition: a simple Leitner system. Each card holds a box (0–6)
   and a "due" timestamp. Box 0 = just missed, due immediately. Higher boxes
   mean longer gaps before the card resurfaces. Quiz/Article answers nudge
   the box up (correct) or reset it to 0 (wrong); the manual ✓/↻ buttons on
   a flashcard are a coarser override for the same mechanism. */
const PROGRESS_KEY = "progress:v1";
const idOf = (deck, front) => `${deck}::${front}`;
const DAY_MS = 24 * 60 * 60 * 1000;
const LEITNER_INTERVAL_DAYS = [0, 1, 2, 4, 7, 14, 30];
const MAX_BOX = LEITNER_INTERVAL_DAYS.length - 1;
const KNOWN_BOX_THRESHOLD = 4; // box 4+ (7+ day gap) reads as "known" in the UI
const dueFor = (box) => Date.now() + LEITNER_INTERVAL_DAYS[box] * DAY_MS;
const isKnownBox = (box) => box >= KNOWN_BOX_THRESHOLD;
const statusOf = (entry) => {
  if (!entry) return undefined;
  if (isKnownBox(entry.box)) return "known";
  if (entry.box === 0) return "review";
  return "progress"; // mid box - genuinely "in training", neither fresh nor mastered
};
const dueLabel = (due) => {
  const days = Math.ceil((due - Date.now()) / DAY_MS);
  if (days <= 0) return "heute";
  if (days === 1) return "morgen";
  return `in ${days} Tg.`;
};
const ProgressCtx = createContext({ progress: {}, mark: () => {} });
const saveProgress = (map) => {
  try { storage.set(PROGRESS_KEY, JSON.stringify(map)); } catch (e) {}
};

/* ---- daily goal & streak (#6) ---- */
/* "Review" = any graded action: a quiz/article answer, or a manual ✓/↻ mark.
   A day's goal is met once that day's review count reaches `goal`; streak
   increments exactly once per day at the moment the goal is crossed. */
const STREAK_KEY = "streak:v1";
const GOAL_PRESETS = [10, 20, 30, 50];
const localDateStr = (d = new Date()) => {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
};
const addDaysStr = (dateStr, delta) => {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + delta);
  return localDateStr(dt);
};
const saveStreak = (data) => {
  try { storage.set(STREAK_KEY, JSON.stringify(data)); } catch (e) {}
};
// what to show right now without needing the user to act first (so a broken
// streak is visible immediately, the way it would be in any habit tracker)
const effectiveStreakDisplay = (data) => {
  if (!data) return 0;
  const today = localDateStr();
  if (data.date === today) return data.streak;
  const yesterday = addDaysStr(today, -1);
  if (data.date === yesterday && data.count >= data.goal) return data.streak; // still valid, hasn't acted today yet
  return 0;
};

const shuffled = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

const step = (setIdx, total) => (dir) => {
  if (!total) return;
  setIdx((i) => (i + dir + total) % total);
};

const toggle = (arr, key) =>
  arr.includes(key) ? arr.filter((k) => k !== key) : [...arr, key];

// turn any card from any deck into a uniform FlipCard shape (+ kind for filtering)
function normalizeCard(deckKey, c) {
  const icon = DECK_META[deckKey].icon;
  const deckLabel = DECK_META[deckKey].label;
  if (deckKey === "irregular") {
    return {
      deck: deckKey, kind: "v",
      front: c.infinitiv, sub: `${c.präteritum} · ${c.partizip}`,
      back: c.english, example: c.example,
      accent: GROUP_COLORS[c.group] || "#4f86c6", badge: `${icon} ${deckLabel} · ${c.group}`,
    };
  }
  if (deckKey === "inseparable") {
    return {
      deck: deckKey, kind: "v",
      front: c.infinitiv, sub: `hat ${c.partizip}`,
      back: c.english, example: c.example, exampleEn: c.exampleEn,
      accent: "#5fa85f", badge: `${icon} ${deckLabel}`,
    };
  }
  // catch-all for every other deck: the 5 original typed decks (kleidung / verkehr /
  // haushalt) plus all 17 Lektionen topics, since they all share the same card shape
  return {
    deck: deckKey, kind: c.type, gender: c.gender,
    front: c.front, sub: c.sub, back: c.english,
    example: c.example, exampleEn: c.exampleEn,
    accent: c.type === "n" ? GENDER_COLORS[c.gender] : TYPE_META[c.type].color,
    badge: `${icon} ${deckLabel} · ${c.type === "n" ? `Nomen · ${c.gender}` : TYPE_META[c.type].label}`,
  };
}

const matches = (obj, q) => {
  if (!q) return true;
  const t = q.toLowerCase();
  return Object.values(obj).some(
    (v) => typeof v === "string" && v.toLowerCase().includes(t)
  );
};

let _voices = [];
const loadVoices = () => {
  try { _voices = window.speechSynthesis.getVoices() || []; } catch (e) {}
};
if (typeof window !== "undefined" && window.speechSynthesis) {
  loadVoices();
  try { window.speechSynthesis.addEventListener("voiceschanged", loadVoices); } catch (e) {}
}

const speak = (text, onErr) => {
  const fail = () => { if (onErr) onErr(); };
  try {
    const synth = window.speechSynthesis;
    if (!synth || typeof SpeechSynthesisUtterance === "undefined") return fail();
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "de-DE";
    u.rate = 0.95;
    const pool = _voices.length ? _voices : synth.getVoices();
    const de = pool.find((v) => /^de(\b|[-_])/i.test(v.lang));
    if (de) u.voice = de;
    u.onerror = fail;
    let started = false;
    u.onstart = () => { started = true; };
    synth.speak(u);
    // Chrome/mobile: speech sometimes stays paused; nudge it, then verify it actually started
    setTimeout(() => { try { if (synth.paused) synth.resume(); } catch (e) {} }, 200);
    setTimeout(() => { if (!started && !synth.speaking) fail(); }, 1200);
  } catch (e) { fail(); }
};

const aiExampleMemCache = new Map(); // in-memory, instant within this session
const hashStr = (s) => {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return (h >>> 0).toString(36);
};
const aiExampleKey = (cardId) => `aiex_${hashStr(cardId)}`;

const getCachedAiExample = async (cardId) => {
  if (!cardId) return null;
  if (aiExampleMemCache.has(cardId)) return aiExampleMemCache.get(cardId);
  try {
    const r = await storage.get(aiExampleKey(cardId));
    if (r && r.value) {
      const parsed = JSON.parse(r.value);
      aiExampleMemCache.set(cardId, parsed);
      return parsed;
    }
  } catch (e) {}
  return null;
};

/* ---- Multilingual support - V1 client-side translation engine.
   Two layers, tried in order, with the same translate-once-cache-forever
   philosophy as before (now backed by localStorage instead of an API):

   1. Chrome's built-in on-device Translator API - instant, zero download,
      because the model is already resident in the browser. Desktop Chrome
      only (confirmed: it does not work on mobile at all), so this is a
      bonus fast-path, never the foundation.
   2. A small (~30–45MB int8-quantized) per-language ONNX translation
      model, run via Transformers.js + WebAssembly. Works on any modern
      browser including mobile. Downloads once on first use of that
      language, then the browser caches the model file itself - every
      use after that, on any page reload, is instant and fully offline.

   REVISED: the WASM/native-Translator approach above was tried and dropped
   after real testing - three rounds of debugging (a sandbox-specific
   DataCloneError, then a model/runtime quantization incompatibility) never
   produced a single confirmed working translation, and it couldn't help
   custom/arbitrary languages anyway (no pre-built model exists for a name
   someone just typed in). MyMemory's free API, by contrast, worked cleanly
   on the first real test across all 4 curated languages. New approach,
   in priority order:
     1. A manual correction (see "✗ falsch?" in FlipCard/ArticleTrainer) -
        always wins, since a person said so directly.
     2. A small, hand-reviewed static table (real content work, not a live
        guess) - covers the words seeded so far.
     3. A hard-to-translate guard - slash-separated dual meanings and short
        idioms/function words are where MyMemory's real test results
        actually broke (e.g. "than" → a whole unrelated sentence in Hindi).
        Skip live translation for these rather than risk a confident wrong
        answer; show English instead.
     4. MyMemory's free API - works for both curated and custom languages,
        same mechanism, no key required. ---- */

  if (translationMemCache.has(memKey)) return translationMemCache.get(memKey);

  } catch (e) {}

// live-fetch cache above - deliberately, not just for tidiness. If

// once" - which matters once the static table (#A) grows over time: a new
// table entry needs to be able to override an old cached MyMemory guess,
// while a person's correction should still be able to override the table

const correctionMemCache = new Map();
const correctionKey = (cacheKey, lang) => `corr_${hashStr(lang + "::" + cacheKey)}`;

  const memKey = lang + "::" + cacheKey;
  if (correctionMemCache.has(memKey)) return correctionMemCache.get(memKey);
  try {
    const r = await storage.get(correctionKey(cacheKey, lang));
    if (r && r.value) {
      correctionMemCache.set(memKey, r.value);
      return r.value;
    }
  } catch (e) {}
  return null;
};
const submitCorrection = (cacheKey, lang, correctedText) => {
  correctionMemCache.set(lang + "::" + cacheKey, correctedText);
  try { storage.set(correctionKey(cacheKey, lang), correctedText); } catch (e) {}
};

/* ---- #3: skip live translation for known-risky phrasing. Evidence-based,
   not theoretical - every category here is something MyMemory's real test
   actually got wrong (e.g. "than" → "then you came" in Hindi). Showing
   English is strictly safer than a confident, fluent-looking wrong answer. */
const HARD_TRANSLATE_TERMS = new Set(["than", "for example"]);
const isHardToTranslate = (text) => text.includes("/") || HARD_TRANSLATE_TERMS.has(text.trim().toLowerCase());

/* ---- #4: MyMemory's free translation API. No key, CORS-enabled, callable
   directly from the browser. */
const fetchMyMemory = async (text, lang) => {
  try {
    const url = "https://api.mymemory.translated.net/get?q=" + encodeURIComponent(text) + "&langpair=en|" + lang;
    const res = await fetch(url);
    const data = await res.json();
    return (data && data.responseData && data.responseData.translatedText) || null;
  } catch (e) {
    console.warn("[translate] MyMemory request failed for", lang, ":", e);
    return null;
  }
};

// translate arbitrary English text into the target language, cached by a stable key (usually the card id)
const translateText = async (text, lang, cacheKey) => {
  if (!text || !lang || lang === "en") return text;
  // 1. a manual correction always wins, permanently, over everything below
  const corrected = await getCorrection(cacheKey, lang);
  if (corrected) return corrected;
  // 2. hand-reviewed static table - checked before the live-fetch cache on
  //    purpose, so extending this table later actually overrides an old
  //    cached MyMemory guess, not just future lookups for words never seen before
  const staticEntry = STATIC_TRANSLATIONS[text];
  if (staticEntry && staticEntry[lang]) return staticEntry[lang];
  // 3. known-risky phrasing - don't guess, show English
  if (isHardToTranslate(text)) {
    console.warn("[translate] skipping live translation for a known-hard phrase:", JSON.stringify(text), "-> showing English for", lang);
    return text;
  }
  // 4. a previously-fetched live result, so the same word+language never needs a second network round-trip
  const cached = await getCachedTranslation(cacheKey, lang);
  if (cached) return cached;
  // 5. MyMemory
  const translated = await fetchMyMemory(text, lang);
  if (!translated) {
    console.warn("[translate] no translation available for", JSON.stringify(text), "->", lang, "- showing English instead");
    return text;
  }
  setCachedTranslation(cacheKey, lang, translated);
  return translated;
};

function FlipCard({ front, sub, back, example, exampleEn, accent, badge, cardId, lang = "en" }) {
  const { progress, mark } = useContext(ProgressCtx);
  const entry = cardId ? progress[cardId] : undefined;
  const status = statusOf(entry);
  const [flipped, setFlipped] = useState(false);
  const [ai, setAi] = useState(null); // { de, en } - only ever populated from a static example or a vestigial cached value; V1 never generates one
  const [audioErr, setAudioErr] = useState(false);
  const [transBack, setTransBack] = useState(back);
  const [transExEn, setTransExEn] = useState(null);
  const [correcting, setCorrecting] = useState(false);
  const [correctionText, setCorrectionText] = useState("");
  useEffect(() => {
    setFlipped(false);
    setAi(null);
    setAudioErr(false);
    setCorrecting(false);
    setCorrectionText("");
    if (example || !cardId) return; // static example already exists, or no id to cache against
    let cancelled = false;
    getCachedAiExample(cardId).then((cached) => {
      if (!cancelled && cached) setAi(cached);
    });
    return () => { cancelled = true; };
  }, [front, back, cardId, example]);
  // #1+#4: translate the meaning shown on the back, in whatever language is selected
  useEffect(() => {
    setTransBack(back);
    if (!cardId || lang === "en") return;
    let cancelled = false;
    translateText(back, lang, cardId).then((t) => { if (!cancelled) setTransBack(t); });
    return () => { cancelled = true; };
  }, [back, lang, cardId]);
  // #D: a person's correction overrides everything else for this word+language, permanently
  const submitTransCorrection = () => {
    const text = correctionText.trim();
    if (!text || !cardId) { setCorrecting(false); return; }
    submitCorrection(cardId, lang, text);
    setTransBack(text);
    setCorrecting(false);
    setCorrectionText("");
  };

  const opposite = sub && sub.includes("↔") ? sub.split("↔").pop().trim() : null;
  const stop = (fn) => (e) => { e.stopPropagation(); fn(); };

  const shown = example ? { de: example, en: exampleEn } : ai;
  useEffect(() => {
    setTransExEn(null);
    if (!cardId || lang === "en" || !shown || !shown.en) return;
    let cancelled = false;
    translateText(shown.en, lang, cardId + ":ex").then((t) => { if (!cancelled) setTransExEn(t); });
    return () => { cancelled = true; };
  }, [shown && shown.en, lang, cardId]);

  return (
    <div
      onClick={() => setFlipped((f) => !f)}
      style={{ perspective: 1200, cursor: "pointer", userSelect: "none" }}
    >
      <div
        style={{
          position: "relative",
          width: "100%",
          minHeight: 300,
          transformStyle: "preserve-3d",
          transition: "transform .5s cubic-bezier(.4,.2,.2,1)",
          transform: flipped ? "rotateY(180deg)" : "none",
        }}
      >
        {/* FRONT */}
        <div style={faceStyle(accent)}>
          {badge && <span style={badgeStyle(accent)}>{badge}</span>}
          <div style={{ fontSize: 32, fontWeight: 700, color: "#f2f5f8", textAlign: "center", lineHeight: 1.2 }}>
            {front}
            <button onClick={stop(() => speak(front, () => setAudioErr(true)))} title="Aussprechen" style={{ ...iconBtn, fontSize: 18 }}>🔊</button>
          </div>
          {sub && <div style={{ marginTop: 12, fontSize: 14, color: accent, fontWeight: 600, textAlign: "center" }}>{sub}</div>}
          {audioErr && <div style={{ marginTop: 10, fontSize: 11, color: "#c6925a", textAlign: "center" }}>🔇 Audio in dieser Umgebung blockiert</div>}
          {entry && (
            <div
              style={{
                marginTop: 10, fontSize: 11, fontWeight: 700, textAlign: "center",
                color: status === "known" ? "#5fa85f" : status === "review" ? "#e0833b" : "#7fb0d6",
              }}
            >
              {status === "known" ? "✓ gekonnt" : status === "review" ? "↻ üben" : `📦 Box ${entry.box}/${MAX_BOX}`}
              {" · fällig "}{dueLabel(entry.due)}
            </div>
          )}
          <div style={{ position: "absolute", bottom: 14, fontSize: 10, color: "#5a6b78", letterSpacing: 1 }}>
            TAP TO FLIP
          </div>
        </div>
        {/* BACK */}
        <div style={{ ...faceStyle(accent), transform: "rotateY(180deg)" }}>
          <div dir="auto" style={{ fontSize: 24, fontWeight: 700, color: "#f2f5f8", textAlign: "center" }}>{transBack}</div>
          {lang !== "en" && cardId && (
            correcting ? (
              <div onClick={stop(() => {})} style={{ display: "flex", gap: 4, marginTop: 6, alignItems: "center" }}>
                <input
                  autoFocus
                  dir="auto"
                  value={correctionText}
                  onChange={(e) => setCorrectionText(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Enter") submitTransCorrection(); if (e.key === "Escape") { setCorrecting(false); setCorrectionText(""); } }}
                  placeholder="richtige Übersetzung…"
                  style={{ flex: 1, minWidth: 0, padding: "4px 8px", borderRadius: 8, border: "1px solid #e0833b", background: "#161d24", color: "#f2f5f8", fontSize: 12, outline: "none" }}
                />
                <button onClick={stop(submitTransCorrection)} style={{ padding: "4px 9px", borderRadius: 8, border: "none", background: "#5fa85f", color: "#0e1419", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>✓</button>
                <button onClick={stop(() => { setCorrecting(false); setCorrectionText(""); })} style={{ padding: "4px 9px", borderRadius: 8, border: "1px solid #2c3a47", background: "transparent", color: "#7d8d9c", fontSize: 12, cursor: "pointer" }}>×</button>
              </div>
            ) : (
              <button
                onClick={stop(() => { setCorrecting(true); setCorrectionText(transBack); })}
                style={{ marginTop: 4, background: "none", border: "none", color: "#5a6b78", fontSize: 11, cursor: "pointer", textDecoration: "underline" }}
              >✗ falsch?</button>
            )
          )}
          {opposite && (
            <div style={{ marginTop: 10, fontSize: 12, fontWeight: 600, color: accent, border: `1px solid ${accent}`, borderRadius: 8, padding: "3px 10px" }}>
              Gegenteil: {opposite}
            </div>
          )}
          {shown ? (
            <>
              <div style={{ marginTop: 16, fontSize: 14, color: "#cdd8e2", textAlign: "center", fontStyle: "italic", lineHeight: 1.5 }}>
                „{shown.de}"
                <button onClick={stop(() => speak(shown.de, () => setAudioErr(true)))} style={{ ...iconBtn, fontSize: 13 }}>🔊</button>
              </div>
              {shown.en && (
                <div dir="auto" style={{ marginTop: 6, fontSize: 12, color: "#7d8d9c", textAlign: "center", lineHeight: 1.4 }}>
                  {lang !== "en" && transExEn ? transExEn : shown.en}
                </div>
              )}
            </>
          ) : (
            <div style={{ marginTop: 16, fontSize: 11, color: "#5a6b78", textAlign: "center", fontStyle: "italic" }}>
              kein Beispielsatz für dieses Wort
            </div>
          )}
          {audioErr && (
            <div style={{ marginTop: 8, fontSize: 11, color: "#c6925a", textAlign: "center" }}>
              🔇 Audio in dieser Umgebung blockiert
            </div>
          )}
          {cardId && (
            <div style={{ position: "absolute", bottom: 12, display: "flex", gap: 8 }}>
              <button
                onClick={stop(() => mark(cardId, status === "known" ? null : "known"))}
                style={{ padding: "4px 10px", borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", border: "1px solid #5fa85f", background: status === "known" ? "#5fa85f" : "transparent", color: status === "known" ? "#0e1419" : "#5fa85f" }}
              >✓ Gekonnt</button>
              <button
                onClick={stop(() => mark(cardId, status === "review" ? null : "review"))}
                style={{ padding: "4px 10px", borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", border: "1px solid #e0833b", background: status === "review" ? "#e0833b" : "transparent", color: status === "review" ? "#0e1419" : "#e0833b" }}

/* Multi-select category filter with a Select-all toggle */
function CategoryFilter({ cats, active, onChange, setIdx, colorFor, allKeys }) {
  const allOn = allKeys.every((k) => active.includes(k));
  const chip = (on, color, content, onClick, key) => (
    <button
      key={key}
      onClick={onClick}
      style={{
        padding: "5px 12px", borderRadius: 8, fontSize: 11, fontWeight: 600, cursor: "pointer",
        border: on ? "none" : "1px solid #2c3a47",
        background: on ? color : "#1e2630",
        color: on ? "#fff" : "#9aa7b3",
        display: "inline-flex", alignItems: "center", gap: 5,
      }}
    >{content}</button>
  );
  return (
    <div style={{ display: "flex", gap: 6, justifyContent: "center", marginBottom: 18, flexWrap: "wrap" }}>
      {chip(
        allOn, "#e0833b",
        <><span>{allOn ? "✓" : "▢"}</span> Alle</>,
        () => { onChange(allOn ? [] : [...allKeys]); setIdx(0); },
        "__all__"
      )}
      {cats.map(([key, lbl]) => {
        const on = active.includes(key);
        return chip(
          on, colorFor(key),
          <>{on && <span>✓</span>} {lbl}</>,
          () => { onChange(toggle(active, key)); setIdx(0); },
          key
        );
      })}
    </div>
  );
}

/* Generic view for the Lektion topic decks (typed vocabulary) */
function TypedTopicView({ topic, slice, setSlice, query, lang }) {
  const cards = topic.cards;
  const filtered = slice.order.filter((c) => slice.filter.includes(c.type) && matches(c, query));
  const total = filtered.length;
  const card = filtered[slice.idx % (total || 1)];
  return (
    <>
      {topic.note && (
        <div style={{ background: "#16202a", borderRadius: 12, padding: "10px 16px", marginBottom: 16, fontSize: 12, color: "#8fb8d8", textAlign: "center" }}>
          {topic.icon} {topic.note} · {cards.length} Karten
        </div>
      )}
      {topic.cats.length > 1 && (
        <CategoryFilter
          cats={topic.cats}
          allKeys={topic.keys}
          active={slice.filter}
          onChange={(f) => setSlice({ filter: f })}
          setIdx={() => setSlice({ idx: 0 })}
          colorFor={typeColorOf}
        />
      )}
      {card ? (
        <>
          <FlipCard
            front={card.front}
            sub={card.sub}
            back={card.english}
            example={card.example}
            exampleEn={card.exampleEn}
            accent={card.type === "n" ? GENDER_COLORS[card.gender] : TYPE_META[card.type].color}
            badge={`${topic.icon} ${topic.label} · ${card.type === "n" ? `Nomen · ${card.gender}` : TYPE_META[card.type].label}`}
            cardId={idOf(topic.key, card.front)}
            lang={lang}
          />
          <Controls
            index={slice.idx % total}
            total={total}
            onPrev={() => setSlice({ idx: (slice.idx - 1 + total) % total })}
            onNext={() => setSlice({ idx: (slice.idx + 1) % total })}
            onShuffle={() => setSlice(
              slice.shuffled
                ? { order: cards, idx: 0, shuffled: false }
                : { order: shuffled(cards), filter: topic.keys, idx: 0, shuffled: true }
            )}
            isShuffled={Boolean(slice.shuffled)}
          />

/* Fixed bottom bar for the "Weiter →" action - stays visible regardless of
   how tall the answered content above gets, so there's never a need to
   scroll to find it. */
function FloatingNext({ onNext, label = "Weiter →" }) {
  // Sticky, not fixed: a fixed-to-viewport button stays pinned to the literal
  // bottom of the browser window regardless of how tall that window is - on a
  // large desktop screen that can mean a long, inconvenient mouse trip from
  // the card down to the button. Sticky instead only "sticks" within the
  // bounds of its own container: if the question/answer block is shorter
  // than the viewport (the common large-screen case), the button simply
  // renders right after the content, in its natural place - no special-casing
  // needed for screen size, the CSS itself adapts.
  return (
    <div style={{ position: "sticky", bottom: "calc(16px + env(safe-area-inset-bottom, 0px))", paddingTop: 14, marginTop: 14, zIndex: 50 }}>
      <button
        onClick={onNext}
        style={{ width: "100%", padding: "14px 0", borderRadius: 12, border: "none", background: "#e0833b", color: "#0e1419", fontSize: 14, fontWeight: 700, cursor: "pointer", boxShadow: "0 4px 16px rgba(0,0,0,.4)" }}
      >{label}</button>
    </div>
  );
}

  const exampleRef = useRef(null);
  useEffect(() => {
    setAiEx(null);
    setPeek(false);

    let cancelled = false;
    getCachedAiExample(idOf(card.deck, card.front)).then((cached) => {

    let cancelled = false;

  }, [card && card.deck, card && card.front, card && card.english, lang]);
  const shownExampleForTrans = card ? (card.example ? { de: card.example, en: card.exampleEn } : aiEx) : null;
  useEffect(() => {

  const submitMeaningCorrection = () => {
    const text = correctionText.trim();

/* Build a multiple-choice quiz from the selected cards (German → English) */
const ROUND_SIZE = 15; // cap for both quiz and article rounds - what makes weighting matter

// Spaced repetition (#4): overdue cards are sampled far more often, cards not
// yet due are sampled rarely, and never-seen cards get a healthy default -
// this is what actually drives Leitner-style review instead of flat shuffling.
const cardWeight = (card, progress) => {
  const entry = progress[idOf(card.deck, card.front)];
  if (!entry) return 2.2; // new - worth prioritizing, but not as much as something overdue
  const now = Date.now();
  if (entry.due <= now) {
    const overdueDays = (now - entry.due) / DAY_MS;
    return Math.min(6, 3 + overdueDays * 0.5); // more overdue → more likely, capped
  }
  return 0.12; // not due yet - rarely shown, never fully excluded
};

// weighted sampling without replacement (A-ES algorithm): higher weight → more likely picked
const weightedSample = (items, n, progress) => {
  const keyed = items.map((c) => ({ c, key: Math.pow(Math.random(), 1 / cardWeight(c, progress)) }));
  keyed.sort((a, b) => b.key - a.key);
  return keyed.slice(0, n).map((x) => x.c);
};

// A10: only truncate a round when the pool is meaningfully bigger than one
// round - a small deck (e.g. 18 nouns) should just run in full rather than
// arbitrarily losing a few words to a cap that barely shortens anything.
const ARTICLE_FULL_THRESHOLD = 20;
const articleRoundSize = (poolLen) => (poolLen <= ARTICLE_FULL_THRESHOLD ? poolLen : ROUND_SIZE);

// A11: never-studied nouns are guaranteed a slot before weighted sampling
// fills the rest - otherwise a brand-new word can get unlucky and sit out
// of several rounds in a row purely by chance.
const buildArticleRound = (nouns, progress, n) => {
  const neverSeen = nouns.filter((c) => !progress[idOf(c.deck, c.front)]);
  const rest = nouns.filter((c) => progress[idOf(c.deck, c.front)]);
  if (neverSeen.length >= n) return shuffled(neverSeen).slice(0, n);
  const filled = weightedSample(rest, Math.min(n - neverSeen.length, rest.length), progress);
  return shuffled([...neverSeen, ...filled]); // shuffle so new words aren't always first in the round
};

// A13: when multiple topics are selected, give every represented deck a fair,
// adaptively-recomputed share of the round instead of letting one big or
// heavily-overdue deck crowd a smaller one out entirely. Falls back to the
// plain builder above when only one deck is actually present.
const buildArticleRoundStratified = (nouns, progress, n) => {
  const decks = [...new Set(nouns.map((c) => c.deck))];
  if (decks.length <= 1) return buildArticleRound(nouns, progress, n);
  let decksLeft = shuffled(decks); // randomize order so no deck is systematically favored or shortchanged
  let remaining = n;
  let pool = [...nouns];
  const result = [];
  while (decksLeft.length && remaining > 0) {
    const d = decksLeft[0];
    decksLeft = decksLeft.slice(1);
    const share = Math.max(1, Math.ceil(remaining / (decksLeft.length + 1))); // fair split of what's left
    const deckNouns = pool.filter((c) => c.deck === d);
    const take = Math.min(share, deckNouns.length, remaining);
    if (take > 0) {
      const picked = buildArticleRound(deckNouns, progress, take);
      result.push(...picked);
      pool = pool.filter((c) => !picked.includes(c));
      remaining -= picked.length;
    }
  }
  if (remaining > 0 && pool.length) result.push(...buildArticleRound(pool, progress, Math.min(remaining, pool.length)));
  return shuffled(result);
};

// A14: let the person override the automatic round-size behaviour
const ARTICLE_SIZE_PRESETS = ["auto", 10, 15, 25, "all"];
const ARTICLE_SIZE_KEY = "articleSize:v1";
const saveArticleSizePref = (v) => {
  try { storage.set(ARTICLE_SIZE_KEY, JSON.stringify(v)); } catch (e) {}
};
const resolveArticleRoundSize = (pref, poolLen) => {
  if (pref === "all") return poolLen;
  if (pref === "auto" || pref == null) return articleRoundSize(poolLen);
  return Math.min(pref, poolLen);
};
const articleSizeLabel = (pref) => (pref === "auto" ? "Auto" : pref === "all" ? "Alle" : String(pref));

const buildQuiz = (cards, progress, distractorCards) => {
  const pool = cards.filter((c) => c.english && c.front);
  const dPool = (distractorCards || cards).filter((c) => c.english && c.front);
  const n = Math.min(ROUND_SIZE, pool.length);
  const chosen = weightedSample(pool, n, progress || {});
  return chosen.map((c) => {
    const distractors = [];
    const addFrom = (list) => {
      const unique = shuffled([...new Set(list.map((o) => o.english))].filter((e) => e !== c.english && !distractors.includes(e)));
      for (const e of unique) {
        if (distractors.length >= 3) break;
        distractors.push(e);
      }
    };
    // Q4: same deck + same type first - hardest, most topically plausible wrong answers
    addFrom(dPool.filter((o) => o.deck === c.deck && o.kind === c.kind));
    // Q1 fallback: same type, any deck (e.g. small or single-deck selections)
    if (distractors.length < 3) addFrom(dPool.filter((o) => o.kind === c.kind));
    // final fallback: whatever's left in the pool
    if (distractors.length < 3) addFrom(dPool);
    return {
      front: c.front, deck: c.deck, kind: c.kind, answer: c.english,
      example: c.example, exampleEn: c.exampleEn,
      options: shuffled([c.english, ...distractors]),
    };
  });
};

/* Multiple-choice translation quiz */
function QuizTrainer({ questions, idx, choice, score, onChoose, onNext, lang = "en" }) {
  const q = questions.length ? questions[idx % questions.length] : null;
  const [aiEx, setAiEx] = useState(null); // only ever populated from a static example or a vestigial cached value; V1 never generates one
  const [transOptions, setTransOptions] = useState(null);
  const [transExEn, setTransExEn] = useState(null);
  const exampleRef = useRef(null);
  useEffect(() => {
    setAiEx(null);
    if (!q || q.example) return; // no question yet, or it already has a static example
    let cancelled = false;
    getCachedAiExample(idOf(q.deck, q.front)).then((cached) => {
      if (!cancelled && cached) setAiEx(cached);
    });
    return () => { cancelled = true; };
  }, [q && q.deck, q && q.front, q && q.example]);
  // #1+#4: translate the 4 answer options into the selected language, cached per option text
  useEffect(() => {
    setTransOptions(null);
    if (!q || lang === "en") return;
    let cancelled = false;
    Promise.all(q.options.map((opt) => translateText(opt, lang, idOf(q.deck, q.front) + ":opt:" + opt))).then((res) => {
      if (!cancelled) setTransOptions(res);
    });
    return () => { cancelled = true; };
  }, [q && q.deck, q && q.front, lang]);
  // bring the example panel into view once an answer is given, so it's never hidden below the fold on mobile
  useEffect(() => {
    if (choice && exampleRef.current) {
      exampleRef.current.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  }, [choice]);
  const shownExample = q ? (q.example ? { de: q.example, en: q.exampleEn } : aiEx) : null;
  // #1+#4: translate the example's English line too, once an answer has been given
  useEffect(() => {
    setTransExEn(null);
    if (!q || lang === "en" || !shownExample || !shownExample.en) return;
    let cancelled = false;
    translateText(shownExample.en, lang, idOf(q.deck, q.front) + ":ex").then((t) => { if (!cancelled) setTransExEn(t); });
    return () => { cancelled = true; };
  }, [shownExample && shownExample.en, lang, q && q.deck, q && q.front]);

  if (!q || questions.length < 2) {
    return (
      <div style={{ textAlign: "center", padding: "50px 20px", color: "#7d8d9c" }}>
        <div style={{ fontSize: 40, marginBottom: 10 }}>📝</div>
        <div style={{ fontSize: 15, color: "#cdd8e2", fontWeight: 600 }}>Zu wenige Karten für ein Quiz</div>
        <div style={{ fontSize: 13, marginTop: 6 }}>Wähle ein Thema mit mehr Wörtern.</div>
      </div>
    );
  }
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#7d8d9c", marginBottom: 14 }}>
        <span>{idx + 1} / {questions.length}</span>
        <span>Punkte: {score.right} / {score.total}</span>
      </div>
      <div style={{ position: "relative", background: "#161d24", border: "2px solid #2c3a47", borderRadius: 18, padding: "30px 20px", textAlign: "center", boxShadow: "0 10px 30px rgba(0,0,0,.45)" }}>
        {DECK_META[q.deck] && (
          <span style={badgeStyle("#7fb0d6")}>{DECK_META[q.deck].icon} {DECK_META[q.deck].label}</span>
        )}
        <div style={{ fontSize: 12, color: "#5a6b78", letterSpacing: 1, marginBottom: 10 }}>WAS BEDEUTET?</div>
        <div style={{ fontSize: 28, fontWeight: 700, color: "#f2f5f8" }}>
          {q.front}
          <button onClick={() => speak(q.front)} style={{ ...iconBtn, fontSize: 16 }}>🔊</button>
        </div>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 16 }}>
        {q.options.map((opt, i) => {
          const answered = Boolean(choice);
          const isCorrect = opt === q.answer;
          const isChosen = opt === choice;
          let bg = "#1a232b", col = "#cdd8e2", bd = "#2c3a47";
          if (answered) {
            if (isCorrect) { bg = "#5fa85f"; col = "#0e1419"; bd = "#5fa85f"; }
            else if (isChosen) { bg = "#c6534f"; col = "#fff"; bd = "#c6534f"; }
            else { col = "#55636e"; }
          }
          const label = lang !== "en" && transOptions ? transOptions[i] : opt;
          return (
            <button
              key={opt}
              dir="auto"
              onClick={() => !answered && onChoose(opt)}
              style={{ padding: "12px 14px", borderRadius: 12, border: `1px solid ${bd}`, background: bg, color: col, fontSize: 14, fontWeight: 600, cursor: answered ? "default" : "pointer", textAlign: "left" }}
            >{label}</button>
          );
        })}
      </div>
      {choice && (
        <div ref={exampleRef} style={{ marginTop: 14, padding: "12px 14px", borderRadius: 12, background: "#161d24", border: "1px solid #2c3a47", scrollMarginBottom: 90 }}>
          {shownExample ? (
            <>
              <div style={{ fontSize: 13, color: "#cdd8e2", fontStyle: "italic", textAlign: "center" }}>
                „{shownExample.de}"
                <button onClick={() => speak(shownExample.de)} style={{ ...iconBtn, fontSize: 13 }}>🔊</button>
              </div>
              {shownExample.en && (
                <div dir="auto" style={{ marginTop: 4, fontSize: 11, color: "#7d8d9c", textAlign: "center" }}>{lang !== "en" && transExEn ? transExEn : shownExample.en}</div>
              )}
            </>
          ) : (
            <div style={{ textAlign: "center", fontSize: 11, color: "#5a6b78", fontStyle: "italic" }}>
              kein Beispielsatz für dieses Wort
            </div>
          )}
        </div>
      )}
      {choice && <FloatingNext onNext={onNext} />}
    </div>
  );
}

/* Q6: end-of-round summary - score + a list of exactly what was missed,
   with a one-tap way to immediately re-drill just those words. */
function QuizSummary({ score, mistakes, onRestart, onRetryMistakes }) {
  const pct = score.total ? Math.round((score.right / score.total) * 100) : 0;
  const emoji = pct >= 80 ? "🏆" : pct >= 50 ? "👍" : "📚";
  return (
    <div style={{ textAlign: "center", padding: "10px 4px" }}>
      <div style={{ fontSize: 44, marginBottom: 6 }}>{emoji}</div>
      <div style={{ fontSize: 20, fontWeight: 800, color: "#f2f5f8" }}>
        {score.right} / {score.total} richtig ({pct}%)
      </div>
      {mistakes.length > 0 ? (
        <>
          <div style={{ marginTop: 18, fontSize: 12, color: "#9ab0c2", textAlign: "left" }}>Falsch beantwortet:</div>
          <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 6 }}>
            {mistakes.map((m, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", gap: 10, padding: "8px 12px", borderRadius: 10, background: "#161d24", border: "1px solid #2c3a47" }}>
                <span style={{ color: "#f2f5f8", fontWeight: 600, fontSize: 13 }}>{m.front}</span>
                <span style={{ color: "#7d8d9c", fontSize: 13 }}>{m.answer}</span>
              </div>
            ))}
          </div>
        </>
      ) : (
        <div style={{ marginTop: 18, fontSize: 13, color: "#5fa85f", fontWeight: 600 }}>Alles richtig! 🎉</div>
      )}
      <div style={{ display: "flex", gap: 8, marginTop: 20 }}>
        {mistakes.length >= 2 && (
          <button
            onClick={onRetryMistakes}
            style={{ flex: 1, padding: "12px 0", borderRadius: 12, border: "1px solid #e0833b", background: "transparent", color: "#e0833b", fontSize: 13, fontWeight: 700, cursor: "pointer" }}

        >🔁 Neue Runde</button>
      </div>
    </div>
  );
}

      setAOrder(buildArticleRoundStratified(articleNouns, progress, n)); setAIdx(0); setAChoice(null); setAScore({ right: 0, total: 0 });
      setAMistakes([]); setAFinished(false);
    } else if (mode === "quiz") {
      setQOrder(buildQuiz(selectionCards, progress)); setQIdx(0); setQChoice(null); setQScore({ right: 0, total: 0 });
      setQMistakes([]); setQFinished(false);
    }
  }, [mode, tabs, articleSizePref]); // eslint-disable-line
  const chooseArticle = (g) => {
    if (aChoice || !aOrder.length) return;
    const card = aOrder[aIdx % aOrder.length];
    const correct = card.gender === g;
    setAChoice(g);
    setAScore((s) => ({ right: s.right + (correct ? 1 : 0), total: s.total + 1 }));
    if (!correct) setAMistakes((m) => [...m, card]);
    reviewResult(idOf(card.deck, card.front), correct);
  };
  // A1: reaching the last noun ends the round with a summary instead of looping forever
  const nextArticle = () => {
    if (aIdx >= aOrder.length - 1) { setAChoice(null); setAFinished(true); return; }
    setAChoice(null);
    setAIdx((i) => i + 1);
  };
  const restartArticle = () => {
    const n = resolveArticleRoundSize(articleSizePref, articleNouns.length);
    setAOrder(buildArticleRoundStratified(articleNouns, progress, n));
    setAIdx(0); setAChoice(null); setAScore({ right: 0, total: 0 }); setAMistakes([]); setAFinished(false);
  };
  const retryArticleMistakes = () => {
    setAOrder(shuffled(aMistakes));
    setAIdx(0); setAChoice(null); setAScore({ right: 0, total: 0 }); setAMistakes([]); setAFinished(false);
  };
  const chooseQuiz = (opt) => {
    if (qChoice || !qOrder.length) return;
    const q = qOrder[qIdx % qOrder.length];
    const correct = opt === q.answer;
    setQChoice(opt);
    setQScore((s) => ({ right: s.right + (correct ? 1 : 0), total: s.total + 1 }));
    if (!correct) setQMistakes((m) => [...m, q]);
    reviewResult(idOf(q.deck, q.front), correct);
  };
  // Q6: reaching the last question ends the round with a summary instead of looping forever
  const nextQuiz = () => {
    if (qIdx >= qOrder.length - 1) { setQChoice(null); setQFinished(true); return; }
    setQChoice(null);
    setQIdx((i) => i + 1);
  };
  const restartQuiz = () => {
    setQOrder(buildQuiz(selectionCards, progress));
    setQIdx(0); setQChoice(null); setQScore({ right: 0, total: 0 }); setQMistakes([]); setQFinished(false);
  };
  const retryMistakes = () => {
    const pool = qMistakes.map((m) => ({ deck: m.deck, front: m.front, kind: m.kind, english: m.answer, example: m.example, exampleEn: m.exampleEn }));
    setQOrder(buildQuiz(pool, progress, selectionCards)); // questions from mistakes, distractors from the wider selection
    setQIdx(0); setQChoice(null); setQScore({ right: 0, total: 0 }); setQMistakes([]); setQFinished(false);
  };

  // filtered decks
  const filteredIrr = useMemo(
    () => irrDeck.filter((v) => irrFilter.includes(v.group) && matches(v, query)),
    [irrDeck, irrFilter, query]
  );
  const filteredInsep = useMemo(() => insepDeck.filter((v) => matches(v, query)), [insepDeck, query]);
  const filteredHaus = useMemo(
    () => hausDeck.filter((w) => hausFilter.includes(w.type) && matches(w, query)),
    [hausDeck, hausFilter, query]
  );
  const filteredVerk = useMemo(
    () => verkDeck.filter((w) => verkFilter.includes(w.type) && matches(w, query)),
    [verkDeck, verkFilter, query]
  );
  const filteredKleid = useMemo(
    () => kleidDeck.filter((w) => kleidFilter.includes(w.type) && matches(w, query)),
    [kleidDeck, kleidFilter, query]
  );

  const irrVerb = filteredIrr[irrIdx % (filteredIrr.length || 1)];
  const insepVerb = filteredInsep[insepIdx % (filteredInsep.length || 1)];
  const hausWord = filteredHaus[hausIdx % (filteredHaus.length || 1)];
  const verkWord = filteredVerk[verkIdx % (filteredVerk.length || 1)];
  const kleidWord = filteredKleid[kleidIdx % (filteredKleid.length || 1)];

  // combined (multi-topic) filtered deck
  const filteredCombo = useMemo(
    () => comboDeck.filter((c) => comboFilter.includes(c.kind) && matches(c, query)),
    [comboDeck, comboFilter, query]
  );
  const comboCard = filteredCombo[comboIdx % (filteredCombo.length || 1)];

  // keyboard nav
  useEffect(() => {
    const onKey = (e) => {
      if (e.key !== "ArrowLeft" && e.key !== "ArrowRight") return;
      const dir = e.key === "ArrowRight" ? 1 : -1;
      if (!single) { step(setComboIdx, filteredCombo.length)(dir); return; }
      if (onlyTab === "irregular") step(setIrrIdx, filteredIrr.length)(dir);
      else if (onlyTab === "inseparable") step(setInsepIdx, filteredInsep.length)(dir);
      else if (onlyTab === "haushalt") step(setHausIdx, filteredHaus.length)(dir);
      else if (onlyTab === "verkehr") step(setVerkIdx, filteredVerk.length)(dir);
      else if (onlyTab === "kleidung") step(setKleidIdx, filteredKleid.length)(dir);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [single, onlyTab, filteredCombo.length, filteredIrr.length, filteredInsep.length, filteredHaus.length, filteredVerk.length, filteredKleid.length]);

  const TABS = [
    ["kleidung", "👕 Kleidung"],
    ["verkehr", "🚦 Straßenverkehr"],
    ["haushalt", "🧹 Haushalt"],
    ["irregular", "🎵 Irregular"],
    ["inseparable", "🔑 Nicht trennbar"],
    ...EXTRA_TOPICS.map((t) => [t.key, `${t.icon} ${t.label}`]),
  ];

  const typeColor = (key) => (key === "n" ? "#4f86c6" : TYPE_META[key].color);

  const typeFilterRow = (cats, allKeys, active, setActive, setIdx) => (
    <CategoryFilter
      cats={cats}
      allKeys={allKeys}
      active={active}
      onChange={setActive}
      setIdx={setIdx}
      colorFor={typeColor}
    />
  );

  return (
    <ProgressCtx.Provider value={{ progress, mark }}>
    <div style={{ minHeight: "100vh", background: "#0e1419", fontFamily: "system-ui, sans-serif", padding: "28px 16px" }}>
      <div style={{ maxWidth: 480, margin: "0 auto" }}>
        <h1 style={{ color: "#f2f5f8", fontSize: 22, fontWeight: 800, textAlign: "center", margin: "0 0 4px" }}>
          Deutsch Flashcards
        </h1>
        <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
          {LANGUAGES.map(([key, label, flag]) => (
            <button
              key={key}
              onClick={() => { setLang(key); saveLang(key); }}
              title="Sprache der Übersetzungen"
              style={{
                padding: "5px 12px", borderRadius: 10, fontSize: 12, fontWeight: 700, cursor: "pointer",
                border: lang === key ? "none" : "1px solid #2c3a47",
                background: lang === key ? "#e0833b" : "#1a232b",
                color: lang === key ? "#0e1419" : "#9ab0c2",
              }}
            >{flag} {label}</button>
          ))}
          {customLangs.map((name) => (
            <span key={name} style={{ display: "inline-flex", alignItems: "center", borderRadius: 10, overflow: "hidden", border: lang === name ? "none" : "1px solid #2c3a47" }}>
              <button
                onClick={() => { setLang(name); saveLang(name); }}
                style={{ padding: "5px 10px", border: "none", fontSize: 12, fontWeight: 700, cursor: "pointer", background: lang === name ? "#e0833b" : "#1a232b", color: lang === name ? "#0e1419" : "#9ab0c2" }}
              >{name}</button>
              <button
                onClick={() => removeCustomLang(name)}
                title="Entfernen"
                style={{ padding: "5px 8px", border: "none", fontSize: 12, cursor: "pointer", background: lang === name ? "#e0833b" : "#1a232b", color: lang === name ? "#0e1419" : "#7d8d9c" }}
              >×</button>
            </span>
          ))}
          {addingLang ? (
            <span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}>
              <input
                autoFocus
                value={newLangText}
                onChange={(e) => setNewLangText(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") addCustomLang(); if (e.key === "Escape") { setAddingLang(false); setNewLangText(""); } }}
                placeholder="z. B. Türkisch"
                style={{ width: 100, padding: "5px 8px", borderRadius: 8, border: "1px solid #e0833b", background: "#161d24", color: "#f2f5f8", fontSize: 12, outline: "none" }}
              />
              <button onClick={addCustomLang} style={{ padding: "5px 9px", borderRadius: 8, border: "none", background: "#5fa85f", color: "#0e1419", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>✓</button>
              <button onClick={() => { setAddingLang(false); setNewLangText(""); }} style={{ padding: "5px 9px", borderRadius: 8, border: "1px solid #2c3a47", background: "transparent", color: "#7d8d9c", fontSize: 12, cursor: "pointer" }}>×</button>
            </span>
          ) : (
            <button
              onClick={() => setAddingLang(true)}
              title="Weitere Sprache hinzufügen"
              style={{ padding: "5px 10px", borderRadius: 10, border: "1px dashed #2c3a47", background: "transparent", color: "#7d8d9c", fontSize: 12, fontWeight: 700, cursor: "pointer" }}
            >➕</button>
          )}
        </div>
        <p style={{ color: "#5a6b78", fontSize: 12, textAlign: "center", margin: "0 0 16px" }}>
          A1 / A2 · tap to flip, ← → to navigate
        </p>

        <StreakBar streak={displayStreak} count={streakData.count} goal={streakData.goal} recordStreak={streakData.recordStreak} onCycleGoal={cycleGoal} />

        {/* TABS - multi-select topics */}
        <div style={{ display: "flex", gap: 6, justifyContent: "center", marginBottom: 16, flexWrap: "wrap" }}>
          {(() => {
            const allOn = TABS.every(([k]) => tabs.includes(k));
            return (
              <button
                onClick={() => { setTabs(allOn ? ["kleidung"] : TABS.map(([k]) => k)); setQuery(""); }}
                style={{
                  padding: "7px 12px", borderRadius: 10, fontSize: 12, fontWeight: 700, cursor: "pointer",
                  border: allOn ? "none" : "1px solid #2c3a47",
                  background: allOn ? "#e0833b" : "#1a232b",
                  color: allOn ? "#0e1419" : "#9ab0c2",
                }}
              >{allOn ? "✓ " : ""}Alle</button>
            );
          })()}
          {TABS.map(([key, lbl]) => {
            const on = tabs.includes(key);
            return (
              <button
                key={key}
                onClick={() => {
                  // toggle, but never allow an empty selection
                  const next = on ? tabs.filter((k) => k !== key) : [...tabs, key];
                  setTabs(next.length ? next : [key]);
                  setQuery("");
                }}
                style={{
                  padding: "7px 12px", borderRadius: 10, fontSize: 12, fontWeight: 700, cursor: "pointer",
                  border: on ? "none" : "1px solid #2c3a47",
                  background: on ? "#e0833b" : "#1a232b",
                  color: on ? "#0e1419" : "#9ab0c2",
                }}
              >{on ? "✓ " : ""}{lbl}</button>
            );
          })}
        </div>

        {/* SEARCH */}
        <div style={{ position: "relative", marginBottom: 18 }}>
          <input
            value={query}
            onChange={(e) => { setQuery(e.target.value); setIrrIdx(0); setInsepIdx(0); setHausIdx(0); setVerkIdx(0); setKleidIdx(0); setComboIdx(0); }}
            placeholder="Suchen … (deutsch oder englisch)"
            style={{
              width: "100%", boxSizing: "border-box", padding: "10px 36px 10px 14px",
              borderRadius: 12, border: "1px solid #2c3a47", background: "#161d24",
              color: "#f2f5f8", fontSize: 14, outline: "none",
            }}
          />
          {query && (
            <button
              onClick={() => setQuery("")}
              style={{
                position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)",
                background: "none", border: "none", color: "#7d8d9c", fontSize: 18, cursor: "pointer",
              }}
            >×</button>
          )}
        </div>

        {/* MODE SWITCH + PROGRESS */}
        <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
          {[["cards", "🃏 Karten"], ["article", `🎯 Artikel (${articleNouns.length})`], ["quiz", "📝 Quiz"]].map(([m, lbl]) => (
            <button
              key={m}
              onClick={() => setMode(m)}
              style={{ flex: 1, padding: "9px 0", borderRadius: 12, border: "1px solid #2c3a47", background: mode === m ? "#e0833b" : "#1a232b", color: mode === m ? "#0e1419" : "#9ab0c2", fontSize: 12, fontWeight: 700, cursor: "pointer" }}
            >{lbl}</button>
          ))}
        </div>
        {mode === "cards" && selectionCards.length > 0 && <ProgressBar known={knownCount} total={selectionCards.length} due={dueCount} />}
        {mode === "article" && !aFinished && (
          <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 10 }}>
            <button
              onClick={cycleArticleSize}
              style={{ background: "none", border: "1px solid #2c3a47", borderRadius: 8, padding: "4px 10px", color: "#9ab0c2", fontSize: 11, fontWeight: 600, cursor: "pointer" }}
            >🔢 Runde: {articleSizeLabel(articleSizePref)}</button>
          </div>
        )}

        {mode === "article" ? (
          aFinished ? (
            <ArticleSummary
              score={aScore}
              mistakes={aMistakes}
              onRestart={restartArticle}
              onRetryMistakes={retryArticleMistakes}
            />
          ) : (
            <ArticleTrainer
              nouns={aOrder}
              idx={aIdx}
              choice={aChoice}
              score={aScore}
              onChoose={chooseArticle}
              onNext={nextArticle}
              totalAvailable={articleNouns.length}
              lang={lang}
            />
          )
        ) : mode === "quiz" ? (
          qFinished ? (
            <QuizSummary
              score={qScore}
              mistakes={qMistakes}
              onRestart={restartQuiz}
              onRetryMistakes={retryMistakes}
            />
          ) : (
            <QuizTrainer
              questions={qOrder}
              idx={qIdx}
              choice={qChoice}
              score={qScore}
              onChoose={chooseQuiz}
              onNext={nextQuiz}
              lang={lang}
            />
          )
        ) : (
        <>

        {/* IRREGULAR */}
        {single && onlyTab === "irregular" && (
          <>
            <CategoryFilter
              cats={GROUP_KEYS.map((g) => [g, g])}
              allKeys={GROUP_KEYS}
              active={irrFilter}
              onChange={setIrrFilter}
              setIdx={setIrrIdx}
              colorFor={(g) => GROUP_COLORS[g] || "#4f86c6"}
            />
            {irrVerb ? (
              <>
                <FlipCard
                  front={irrVerb.infinitiv}
                  sub={`${irrVerb.präteritum} · ${irrVerb.partizip}`}
                  back={irrVerb.english}
                  example={irrVerb.example}
                  accent={GROUP_COLORS[irrVerb.group] || "#4f86c6"}
                  badge={`${DECK_META.irregular.icon} ${DECK_META.irregular.label} · ${irrVerb.group}`}
                  cardId={idOf("irregular", irrVerb.infinitiv)}
                  lang={lang}
                />
                <Controls index={irrIdx % filteredIrr.length} total={filteredIrr.length}
                  onPrev={() => step(setIrrIdx, filteredIrr.length)(-1)}
                  onNext={() => step(setIrrIdx, filteredIrr.length)(1)}
                  onShuffle={() => {
                    if (irrShuffled) { setIrrDeck(IRREGULAR_VERBS); setIrrIdx(0); setIrrShuffled(false); }
                    else { setIrrDeck(shuffled(IRREGULAR_VERBS)); setIrrFilter(GROUP_KEYS); setIrrIdx(0); setIrrShuffled(true); }
                  }}
                  isShuffled={irrShuffled} />
              </>
            ) : <NoResults q={query} />}
          </>
        )}

        {/* INSEPARABLE */}
        {single && onlyTab === "inseparable" && (
          <>
            <div style={{ background: "#1e2a1e", borderRadius: 12, padding: "10px 16px", marginBottom: 18, fontSize: 12, color: "#7ec87e", textAlign: "center" }}>
              🔑 Inseparable prefixes never add <strong>ge-</strong> in Partizip II
            </div>
            {insepVerb ? (
              <>
                <FlipCard
                  front={insepVerb.infinitiv}
                  sub={`hat ${insepVerb.partizip}${insepVerb.tip ? "  💡" : ""}`}
                  back={insepVerb.english}
                  example={insepVerb.example}
                  exampleEn={insepVerb.exampleEn}
                  accent="#5fa85f"
                  badge={`${DECK_META.inseparable.icon} ${DECK_META.inseparable.label}`}
                  cardId={idOf("inseparable", insepVerb.infinitiv)}
                  lang={lang}
                />
                {insepVerb.tip && (
                  <div style={{ marginTop: 12, fontSize: 12, color: "#9ab0c2", textAlign: "center", lineHeight: 1.5 }}>
                    💡 {insepVerb.tip}
                  </div>
                )}
                <Controls index={insepIdx % filteredInsep.length} total={filteredInsep.length}
                  onPrev={() => step(setInsepIdx, filteredInsep.length)(-1)}
                  onNext={() => step(setInsepIdx, filteredInsep.length)(1)}
                  onShuffle={() => {
                    if (insepShuffled) { setInsepDeck(INSEPARABLE_VERBS); setInsepIdx(0); setInsepShuffled(false); }
                    else { setInsepDeck(shuffled(INSEPARABLE_VERBS)); setInsepIdx(0); setInsepShuffled(true); }
                  }}
                  isShuffled={insepShuffled} />
              </>
            ) : <NoResults q={query} />}
          </>
        )}

        {/* HAUSHALT */}
        {single && onlyTab === "haushalt" && (
          <>
            {typeFilterRow(HAUS_CATS, HAUS_KEYS, hausFilter, setHausFilter, setHausIdx)}
            {hausWord ? (
              <>
                <FlipCard
                  front={hausWord.front}
                  sub={hausWord.sub}
                  back={hausWord.english}
                  example={hausWord.example}
                  exampleEn={hausWord.exampleEn}
                  accent={hausWord.type === "n" ? GENDER_COLORS[hausWord.gender] : TYPE_META[hausWord.type].color}
                  badge={`${DECK_META.haushalt.icon} ${DECK_META.haushalt.label} · ${hausWord.type === "n" ? `Nomen · ${hausWord.gender}` : TYPE_META[hausWord.type].label}`}
                  cardId={idOf("haushalt", hausWord.front)}
                  lang={lang}
                />
                <Controls index={hausIdx % filteredHaus.length} total={filteredHaus.length}
                  onPrev={() => step(setHausIdx, filteredHaus.length)(-1)}
                  onNext={() => step(setHausIdx, filteredHaus.length)(1)}
                  onShuffle={() => {
                    if (hausShuffled) { setHausDeck(HAUSHALT); setHausIdx(0); setHausShuffled(false); }
                    else { setHausDeck(shuffled(HAUSHALT)); setHausFilter(HAUS_KEYS); setHausIdx(0); setHausShuffled(true); }
                  }}
                  isShuffled={hausShuffled} />
              </>
            ) : <NoResults q={query} />}
          </>
        )}

        {/* STRASSENVERKEHR ★ NEW */}
        {single && onlyTab === "verkehr" && (
          <>
            <div style={{ background: "#1e2630", borderRadius: 12, padding: "10px 16px", marginBottom: 16, fontSize: 12, color: "#7fb0d6", textAlign: "center" }}>
              🚦 Im Straßenverkehr - CH = Schweiz, A = Österreich
            </div>
            {typeFilterRow(FULL_CATS, FULL_KEYS, verkFilter, setVerkFilter, setVerkIdx)}
            {verkWord ? (
              <>
                <FlipCard
                  front={verkWord.front}
                  sub={verkWord.sub}
                  back={verkWord.english}
                  example={verkWord.example}
                  exampleEn={verkWord.exampleEn}
                  accent={verkWord.type === "n" ? GENDER_COLORS[verkWord.gender] : TYPE_META[verkWord.type].color}
                  badge={`${DECK_META.verkehr.icon} ${DECK_META.verkehr.label} · ${verkWord.type === "n" ? `Nomen · ${verkWord.gender}` : TYPE_META[verkWord.type].label}`}
                  cardId={idOf("verkehr", verkWord.front)}
                  lang={lang}
                />
                <Controls index={verkIdx % filteredVerk.length} total={filteredVerk.length}
                  onPrev={() => step(setVerkIdx, filteredVerk.length)(-1)}
                  onNext={() => step(setVerkIdx, filteredVerk.length)(1)}
                  onShuffle={() => {
                    if (verkShuffled) { setVerkDeck(VERKEHR); setVerkIdx(0); setVerkShuffled(false); }
                    else { setVerkDeck(shuffled(VERKEHR)); setVerkFilter(FULL_KEYS); setVerkIdx(0); setVerkShuffled(true); }
                  }}
                  isShuffled={verkShuffled} />
              </>
            ) : <NoResults q={query} />}
          </>
        )}

        {/* KLEIDUNG ★ NEW */}
        {single && onlyTab === "kleidung" && (
          <>
            <div style={{ background: "#221c2a", borderRadius: 12, padding: "10px 16px", marginBottom: 16, fontSize: 12, color: "#b89ad6", textAlign: "center" }}>
              👕 Kleidung - Komparativ: <strong>schöner als</strong> · Gleichheit: <strong>(genau)so … wie</strong>
            </div>
            {typeFilterRow(FULL_CATS, FULL_KEYS, kleidFilter, setKleidFilter, setKleidIdx)}
            {kleidWord ? (
              <>
                <FlipCard
                  front={kleidWord.front}
                  sub={kleidWord.sub}
                  back={kleidWord.english}
                  example={kleidWord.example}
                  exampleEn={kleidWord.exampleEn}
                  accent={kleidWord.type === "n" ? GENDER_COLORS[kleidWord.gender] : TYPE_META[kleidWord.type].color}
                  badge={`${DECK_META.kleidung.icon} ${DECK_META.kleidung.label} · ${kleidWord.type === "n" ? `Nomen · ${kleidWord.gender}` : TYPE_META[kleidWord.type].label}`}
                  cardId={idOf("kleidung", kleidWord.front)}
                  lang={lang}
                />
                <Controls index={kleidIdx % filteredKleid.length} total={filteredKleid.length}
                  onPrev={() => step(setKleidIdx, filteredKleid.length)(-1)}
                  onNext={() => step(setKleidIdx, filteredKleid.length)(1)}
                  onShuffle={() => {
                    if (kleidShuffled) { setKleidDeck(KLEIDUNG); setKleidIdx(0); setKleidShuffled(false); }
                    else { setKleidDeck(shuffled(KLEIDUNG)); setKleidFilter(FULL_KEYS); setKleidIdx(0); setKleidShuffled(true); }
                  }}
                  isShuffled={kleidShuffled} />
              </>
            ) : <NoResults q={query} />}
          </>
        )}

        {/* LEKTION TOPICS (typed vocabulary) ★ NEW */}
        {single && EXTRA_KEYS.includes(onlyTab) && (
          <TypedTopicView
            topic={EXTRA_BY_KEY[onlyTab]}
            slice={extra[onlyTab]}
            setSlice={setExtraSlice(onlyTab)}
            query={query}
            lang={lang}
          />
        )}

        {/* COMBINED - two or more topics selected ★ NEW */}
        {!single && (
          <>
            <div style={{ background: "#16202a", borderRadius: 12, padding: "10px 16px", marginBottom: 16, fontSize: 12, color: "#8fb8d8", textAlign: "center" }}>
              🔀 Gemischt - {tabs.map((k) => DECK_META[k].label).join(" · ")} · {comboBase.length} Karten
            </div>
            {comboCats.length > 1 &&
              typeFilterRow(comboCats, comboKeys, comboFilter, setComboFilter, setComboIdx)}
            {comboCard ? (
              <>
                <FlipCard
                  front={comboCard.front}
                  sub={comboCard.sub}
                  back={comboCard.back}
                  example={comboCard.example}
                  exampleEn={comboCard.exampleEn}
                  accent={comboCard.accent}
                  badge={comboCard.badge}
                  cardId={idOf(comboCard.deck, comboCard.front)}
                  lang={lang}
                />
                <Controls index={comboIdx % filteredCombo.length} total={filteredCombo.length}
                  onPrev={() => step(setComboIdx, filteredCombo.length)(-1)}
                  onNext={() => step(setComboIdx, filteredCombo.length)(1)}
                  onShuffle={() => {
                    if (comboShuffled) { setComboDeck(comboBase); setComboIdx(0); setComboShuffled(false); }
                    else { setComboDeck(shuffled(comboBase)); setComboFilter(comboKeys); setComboIdx(0); setComboShuffled(true); }
                  }}
                  isShuffled={comboShuffled} />
              </>
            ) : <NoResults q={query} />}
          </>
        )}

        </>
        )}

        <div style={{ marginTop: 28, color: "#4a5a68", fontSize: 11, textAlign: "center" }}>
          Tap a card to flip • ← → arrow keys to navigate
        </div>
      </div>
    </div>
    </ProgressCtx.Provider>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
document.getElementById('loading').style.display = 'none';
</script>
</body>
</html>
